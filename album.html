<script>
  
// Play Button

document.querySelectorAll('.playButton').forEach(el => {
  el.addEventListener('click', function() {
    this.classList.add('button-clicked');
  });
});



   

// End Play Button


// Stop Button

let enabled = true;

document.querySelectorAll('.playButton').forEach(el => {
  el.addEventListener('click', function() {
    if (!enabled) return;
    this.classList.add('button-clicked');
  });
});

document.querySelector('#stopButton').addEventListener('click', () => {
  enabled = false;
  // optionally remove the class from all
  document.querySelectorAll('.playButton').forEach(el => el.classList.remove('button-clicked'));
});




  // Site-wide stop function: pauses & resets all audio and clears play-button state
  function stopMusic() {
    enabled = false; // optional: prevents further plays until re-enabled
    document.querySelectorAll('audio').forEach(a => {
      a.pause();
      a.currentTime = 0;
    });
    document.querySelectorAll('.playButton').forEach(el => el.classList.remove('button-clicked'));
  }


// End Stop Button


// Search Bar

function myFunction() {
  document.getElementById("searchInput").placeholder = "Search";
}

document.addEventListener('DOMContentLoaded', function () {
  const form = document.getElementById('searchMusic');
  const input = document.getElementById('searchInput');
  const cards = Array.from(document.querySelectorAll('.col')); // card containers
  const titleSelector = '.song-title';

  function normalize(s) {
    return s.trim().toLowerCase();
  }

  function clearHighlights(el) {
    // restore plain text (remove <mark>)
    el.innerHTML = el.textContent;
  }

  function highlightMatch(el, query) {
    clearHighlights(el);
    if (!query) return;
    const text = el.textContent;
    const regex = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'ig');
    el.innerHTML = text.replace(regex, '<mark>$1</mark>');
  }

  function doSearch(q) {
    const qn = normalize(q);
    cards.forEach(card => {
      const titleEl = card.querySelector(titleSelector);
      if (!titleEl) return;
      const titleText = normalize(titleEl.textContent);
      const matched = qn === '' || titleText.includes(qn);
      card.style.display = matched ? '' : 'none';
      highlightMatch(titleEl, qn);
    });
  }

  // Submit handler (prevents page reload)
  form.addEventListener('submit', function (e) {
    e.preventDefault();
    doSearch(input.value);
  });

  // Optional: live search while typing
  input.addEventListener('input', function () {
    doSearch(this.value);
  });
});


document.getElementById('clearButton').addEventListener('click', function() {
    document.getElementById('searchInput').value = '';
});



</script>
