<script>


// Search Bar

document.addEventListener('DOMContentLoaded', () => {

  const form = document.getElementById('searchMusic');
  const input = document.getElementById('searchInput');
  const clearBtn = document.getElementById('clearButton');
  const cards = Array.from(document.querySelectorAll('.col'));

  const titleSelector = '.song-title';

  let rafId = null;

  // -----------------------------
  // Helpers
  // -----------------------------

  function normalize(s) {
    return (s || '')
      .trim()
      .toLowerCase()
      .replace(/[’‘´`]/g, "'"); // normalize apostrophes
  }

  function escapeRegex(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  function highlight(text, query) {
    if (!query) return text;

    const safeQuery = escapeRegex(query);
    const regex = new RegExp(safeQuery, 'gi');

    return text.replace(regex, match => `<mark>${match}</mark>`);
  }

  // -----------------------------
  // Core Search
  // -----------------------------

  function render(query) {

    const q = normalize(query);

    // RESET STATE
    if (!q) {
      for (const card of cards) {
        const titleEl = card.querySelector(titleSelector);
        if (!titleEl) continue;

        card.style.display = '';
        titleEl.textContent = titleEl.dataset.original;
      }
      return;
    }

    for (const card of cards) {

      const titleEl = card.querySelector(titleSelector);
      if (!titleEl) continue;

      const original = titleEl.dataset.original;
      const originalNorm = normalize(original);

      const match = originalNorm.includes(q);

      card.style.display = match ? '' : 'none';

      if (match) {
        titleEl.innerHTML = highlight(original, query);
      }
    }
  }

  // -----------------------------
  // Store original text once
  // -----------------------------

  for (const card of cards) {
    const titleEl = card.querySelector(titleSelector);
    if (titleEl) {
      titleEl.dataset.original = titleEl.textContent;
    }
  }

  // -----------------------------
  // URL sync (?q= support)
  // -----------------------------

  function syncURL(query) {
    const url = new URL(window.location);

    if (query) {
      url.searchParams.set('q', query);
    } else {
      url.searchParams.delete('q');
    }

    window.history.replaceState({}, '', url);
  }

  function getQueryFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get('q') || '';
  }

  // -----------------------------
  // Initial load from URL
  // -----------------------------

  const initial = getQueryFromURL();
  if (initial) {
    input.value = initial;
    render(initial);
  }

  // -----------------------------
  // Input (RAF optimized)
  // -----------------------------

  input.addEventListener('input', e => {

    if (rafId) cancelAnimationFrame(rafId);

    const value = e.target.value;

    syncURL(value);

    rafId = requestAnimationFrame(() => {
      render(value);
    });

  });

  // Prevent Enter refresh
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') e.preventDefault();
  });

  // -----------------------------
  // Clear button
  // -----------------------------

  clearBtn.addEventListener('click', e => {

    e.preventDefault();

    input.value = '';

    if (rafId) cancelAnimationFrame(rafId);

    syncURL('');

    render('');

    input.focus();
  });

});

// Play Button Text Change
document.addEventListener('DOMContentLoaded', () => {
  // helper to get audio id from button (data-for or onclick string)
  const getAudioId = btn => btn.dataset.for || (btn.getAttribute('onclick') || '').match(/['"]([^'"]+)['"]/)?.[1];

  document.querySelectorAll('button.playButton').forEach(btn => {
    const audioId = getAudioId(btn);
    if (!audioId) return;
    const audio = document.getElementById(audioId);
    if (!audio) return;

    // toggle play/pause when button clicked (if you still use handlePlay, keep calling it)
    btn.addEventListener('click', e => {
      // optional: call existing handler if present
      if (typeof handlePlay === 'function') {
        try { handlePlay(btn, audioId); } catch {}
      }

      // toggle playback (ensures play event fires so listeners update text)
      if (audio.paused) {
        audio.play().catch(() => {}); // ignore autoplay rejection
      } else {
        audio.pause();
      }
    });

    // update only this button when playback state changes
    const setPlaying = isPlaying => {
      btn.textContent = isPlaying ? 'Playing' : 'Play';
      btn.classList.toggle('btn-secondary', isPlaying);
      btn.classList.toggle('btn-outline-secondary', !isPlaying);
    };

    audio.addEventListener('play', () => setPlaying(true));
    audio.addEventListener('playing', () => setPlaying(true));
    audio.addEventListener('pause', () => setPlaying(false));
    audio.addEventListener('ended', () => setPlaying(false));
  });
});


// End Play Button

// play one song at a time


var currentAudio = null;

function playAudio(audioElement) {
    if (currentAudio && currentAudio !== audioElement) {
        currentAudio.pause();
        currentAudio.currentTime = 0; // Reset to start
    }
    currentAudio = audioElement;
    audioElement.play();
}

// Play Button Style Active

document.querySelectorAll('.playButton').forEach(btn => {
  btn.addEventListener('click', () => {
    const audioId = btn.dataset.audio;
    const audio = document.getElementById(audioId);

    // pause/reset all other audios and remove clicked style from other buttons
    document.querySelectorAll('audio').forEach(a => {
      if (a !== audio) { a.pause(); a.currentTime = 0; }
    });
    document.querySelectorAll('.playButton').forEach(b => {
      if (b !== btn) b.classList.remove('button-clicked');
    });

    // toggle play/pause for clicked audio and toggle class
    if (audio.paused) {
      audio.play();
      btn.classList.add('button-clicked');
    } else {
      audio.pause();
      btn.classList.remove('button-clicked');
    }

    // when audio ends, remove the style
    audio.addEventListener('ended', () => btn.classList.remove('button-clicked'), { once: true });
  });
});

// Handle play Button

function handlePlay(clickedBtn, audioId) {

  // disable only clicked button
  clickedBtn.disabled = true;
  clickedBtn.classList.add('clicked');

  // play the requested audio
  var a = document.getElementById(audioId);
  if (a) {
    a.currentTime = 0;
    a.play().catch(() => {});
  }
}


function stopMusic() {
  // find all audio elements and pause + reset to start
  document.querySelectorAll('audio').forEach(a => {
    a.pause();
    a.currentTime = 0;
  });

  // re-enable play buttons (if you had disabled them)
  document.querySelectorAll('.playButton').forEach(btn => {
    btn.disabled = false;               // remove disabled state
    btn.classList.remove('disabled');   // remove styling if used
    // ensure click handler present: re-add if you removed it previously
    const audioId = btn.dataset.audio;
    if (audioId && !btn.onclick) {
      btn.onclick = () => document.getElementById(audioId).play();
    }
  });
}


// Re-enable other play buttons when separate play button is pressed

function handlePlay(button, audioId) {
  // Re-enable all other play buttons
  document.querySelectorAll('.playButton').forEach(b => {
    if (b !== button) b.disabled = false;
  });

  // Disable the clicked button
  button.disabled = true;

  // Play the requested audio (example)
  const a = document.getElementById(audioId);
  if (a) {
    // pause any other audio elements if needed
    document.querySelectorAll('audio').forEach(audio => {
      if (audio !== a) { audio.pause(); audio.currentTime = 0; }
    });
    a.play().catch(() => { /* handle autoplay blocked */ });
  }
}

function stopMusic() {
  // stop all audio
  document.querySelectorAll('audio').forEach(audio => {
    audio.pause();
    audio.currentTime = 0;
  });
  // re-enable all play buttons
  document.querySelectorAll('.playButton').forEach(b => b.disabled = false);
}


// Re-Enable Play Button after audio ends


function enableAllPlayButtons() {
  document.querySelectorAll('.playButton').forEach(b => b.disabled = false);
}

// attach ended listeners to every audio on page load
document.querySelectorAll('audio').forEach(a => {
  a.addEventListener('ended', enableAllPlayButtons);
  // also re-enable if audio is paused/stopped unexpectedly
  a.addEventListener('pause', () => {
    if (a.ended) enableAllPlayButtons();
  });
});

(function(){
  const VIDEO_ID = 'T1eu3twooPM'; // replace if needed
  const wrap = document.getElementById('videoWrap');
  const playBtn = document.getElementById('playBtn');
  const poster = document.getElementById('poster');

  // insert YouTube API script
  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  document.head.appendChild(tag);

  // helper: fullscreen
  function enterFullscreen(el){
    if (el.requestFullscreen) return el.requestFullscreen();
    if (el.webkitRequestFullscreen) return el.webkitRequestFullscreen();
    if (el.msRequestFullscreen) return el.msRequestFullscreen();
    return Promise.reject();
  }

  // choose best quality from available levels
  function bestQuality(levels){
    const pref = ['highres','hd2160','hd1440','hd1080','hd720','large','medium','small'];
    for (const q of pref) if (levels.includes(q)) return q;
    return levels[0] || '';
  }

  let player;
  window.onYouTubeIframeAPIReady = function(){
    player = new YT.Player('player', {
      width: '100%',
      height: '100%',
      videoId: VIDEO_ID,
      playerVars: { controls: 1, rel: 0, modestbranding: 1, playsinline: 0 },
      events: {
        onReady: () => {},
        onStateChange: (e) => {
          if (e.data === YT.PlayerState.PLAYING) {
            // hide poster once playing
            poster.style.display = 'none';
            // request highest available quality
            try {
              const levels = player.getAvailableQualityLevels() || [];
              const q = bestQuality(levels);
              if (q) player.setPlaybackQuality(q);
            } catch(e){}
          }
          if (e.data === YT.PlayerState.ENDED) {
            poster.style.display = 'flex';
            player.seekTo(0);
          }
        }
      }
    });
  };

  playBtn.addEventListener('click', async () => {
    // user gesture: enter fullscreen then play
    try { await enterFullscreen(wrap); } catch(e){ /* ignore if blocked */ }

    // if player ready, play and set quality after PLAYING event
    if (player && player.playVideo) {
      player.playVideo();
    } else {
      // API not ready yet — create player with autoplay=1 by setting player when API loads (onYouTubeIframeAPIReady creates it)
      // If API still loading, set a small interval to autoplay when ready
      const check = setInterval(() => {
        if (window.YT && window.YT.Player && !player) {
          clearInterval(check);
          player = new YT.Player('player', {
            width:'100%', height:'100%', videoId: VIDEO_ID,
            playerVars: { autoplay:1, controls:1, rel:0, modestbranding:1, playsinline:0 },
            events: { onStateChange: (e)=> {
              if (e.data === YT.PlayerState.PLAYING) {
                poster.style.display = 'none';
                try {
                  const levels = player.getAvailableQualityLevels() || [];
                  const q = bestQuality(levels);
                  if (q) player.setPlaybackQuality(q);
                } catch(e){}
              }
            } }
          });
        }
      }, 150);
      // fail-safe: if API loads normally, onYouTubeIframeAPIReady will create player
    }
  });
})();
  // end of youtube video functions
